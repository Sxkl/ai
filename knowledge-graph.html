<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>知识图谱 — Supabase</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet">
<style>body{margin:0;font-family:Arial}#graph{width:100vw;height:100vh}
.legend{position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.7);color:#fff;padding:10px 15px;border-radius:8px;font-size:13px;z-index:100}
.legend span{margin:0 10px}</style></head>
<body>
<div class="legend">
<span style="color:#FF6B6B">■ Service</span><span style="color:#4ECDC4">■ Table</span>
<span style="color:#FFE66D">■ FixPattern</span><span style="color:#A78BFA">■ Error</span>
<span style="color:#FF8C42">■ SOP</span><span style="color:#6BCB77">■ API</span>
</div>
<div id="graph"></div>
<script>
const SUPABASE_URL="https://yqqrzyctdhxsppqanxnk.supabase.co";
const SUPABASE_KEY="sb_publishable_GgCZCwMKkT4ZTRxWoZfUQg_PJsY54X1";
const colors={Service:"#FF6B6B",Table:"#4ECDC4",FixPattern:"#FFE66D",Error:"#A78BFA",SOP:"#FF8C42",API:"#6BCB77"};

async function loadGraph(){
  const h={apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY};
  const [nodesR,edgesR]=await Promise.all([
    fetch(SUPABASE_URL+"/rest/v1/knowledge_nodes?select=*&limit=300",{headers:h}).then(r=>r.json()),
    fetch(SUPABASE_URL+"/rest/v1/knowledge_edges?select=*&limit=300",{headers:h}).then(r=>r.json())
  ]);
  const nodeMap={};
  const visNodes=nodesR.map(n=>{nodeMap[n.id]=n;return{id:n.id,label:n.name,group:n.type,color:colors[n.type]||"#ccc",title:n.description||"",font:{size:11}}});
  const visEdges=edgesR.map(e=>({from:e.source_id,to:e.target_id,label:e.relation,arrows:"to",font:{size:9,align:"middle"}}));
  new vis.Network(document.getElementById("graph"),{nodes:new vis.DataSet(visNodes),edges:new vis.DataSet(visEdges)},{physics:{solver:"forceAtlas2Based"},layout:{improvedLayout:true}});
}
loadGraph();
</script></body></html>
