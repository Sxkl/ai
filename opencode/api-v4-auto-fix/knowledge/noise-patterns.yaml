# noise-patterns.yaml — 噪声过滤规则
# Agent 2 (Log Classifier) 加载此文件, 自动标记已知噪声日志

version: 1

# ============================================================
# 全局通用噪声 (所有 Logstore 生效)
# ============================================================
global:
  - regex: "es sim update get lock fail"
    reason: "ES定时任务多Pod竞争锁的正常行为"
    level: WARN
    auto_filter: true
    source: "PR-6836 analysis"
    
  - regex: "HealthCheck.*timed? ?out"
    reason: "滚动发布时的临时探活超时, 自恢复"
    level: WARN
    auto_filter: true
    source: "通用规则"

# ============================================================
# cube-api-v4 噪声规则
# ============================================================
cube-api-v4:
  - regex: "CB-99-9400.*HTTP.*200"
    reason: "SMS MO 业务拒绝 (CN00000964), HTTP 200 正常返回, 非系统错误"
    level: WARN
    auto_filter: true
    exception: "resp_status >= 500"
    source: "K003: CB-99-9400 伪ERROR"
    
  - regex: "Connection prematurely closed BEFORE response"
    reason: "API Gateway 层超时导致连接关闭, 非代码Bug"
    level: WARN
    auto_filter: false  # 仍需关注, 但降级为 WARN
    flag_only: true
    source: "K008: API Gateway 超时"

# ============================================================
# k8s-enterprise-gateway 噪声规则
# ============================================================
k8s-enterprise-gateway:
  - regex: "rsp-header.*FeignConfig\\$TimedFeignLogger"
    reason: "TimedFeignLogger 将响应头记为 ERROR — 日志级别误用, 非真错误"
    level: DEBUG
    auto_filter: true
    source: "K002: TimedFeignLogger ERROR滥用"
    
  - regex: "req-header.*FeignConfig\\$TimedFeignLogger"
    reason: "同上 — 请求头不应记为 ERROR"
    level: DEBUG
    auto_filter: true
    
  - regex: "rsp-body:.*FeignConfig\\$TimedFeignLogger"
    reason: "同上 — 响应体不应记为 ERROR"
    level: DEBUG
    auto_filter: true
    
  - regex: "无分组套餐继续调用原接口获取数据"
    reason: "套餐分组接口降级为原接口 — 正常业务降级行为"
    level: WARN
    auto_filter: true
    source: "k8s-enterprise-gateway WARN 分析"

  - regex: "rsp-header.*content-type.*ISO-8859-1"
    reason: "sim-service 响应编码问题 — 已知缺陷, 待修复"
    level: WARN
    auto_filter: false
    flag_only: true
    source: "K004: ISO-8859-1 乱码"

# ============================================================
# 规则维护
# ============================================================
maintenance:
  auto_reevaluate_days: 30    # 每30天重新评估已有规则有效性
  expires_after_days: 365     # 一年后自动降级为 flag_only
  allow_manual_override: true
