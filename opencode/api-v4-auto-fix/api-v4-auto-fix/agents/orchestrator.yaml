# Agent 0: Orchestrator — 任务调度与超时控制
# 职责: 协调所有 Agent 的执行顺序、超时控制、结果合并

agent:
  id: orchestrator
  name: "API V4 全链路日志分析编排器"
  model: "deepseek-v4-pro"
  temperature: 0.0
  max_tokens: 8192

pipeline:
  # 固定的执行顺序 (DAG)
  steps:
    - id: s0_discover
      agent: orchestrator
      action: "自动发现 SLS project/logstore/region"
      timeout: 30s
      
    - id: s1_jira
      agent: orchestrator
      action: "创建 Jira 分析工单 + Sprint"
      depends_on: [s0_discover]
      
    - id: s1_sls_pull
      agent: sls-puller
      action: "SLS 日志拉取 (ERROR→WARN→INFO)"
      timeout: 300s
      retry: 1
      depends_on: [s0_discover]
      
    - id: s2_classify
      agent: log-classifier
      action: "6维分类 + 噪声过滤"
      timeout: 120s
      depends_on: [s1_sls_pull]
      
    - id: s3_pattern
      agent: pattern-analyzer
      action: "7项深度模式分析 + 风险评分"
      timeout: 120s
      depends_on: [s2_classify]
      
    - id: s4_code_root_cause
      agent: code-root-cause
      action: "GitLab拉码 → 代码级根因定位"
      timeout: 180s
      depends_on: [s3_pattern]
      
    - id: s5_chromadb_match
      agent: chromadb-query
      action: "向量检索匹配已知问题模式"
      timeout: 30s
      depends_on: [s4_code_root_cause]
      
    - id: s6_report
      agent: report-generator
      action: "8段报告 + LQS + Jira上传"
      timeout: 180s
      depends_on: [s3_pattern, s4_code_root_cause, s5_chromadb_match]

# 预配置的服务映射
service_registry:
  cube-api-v4:
    sls_project: "uwp-prod"
    sls_logstores: ["cube-api-v4", "k8s-enterprise-gateway"]
    sls_region: "cn-hongkong"
    gitlab_repos:
      - "cube/enterprise/enterprise-gateway"
    jira_project: "PR"
  sim-service:
    sls_project: "uwp-prod"
    sls_logstores: ["k8s-newk8s-sim"]
    sls_region: "cn-hongkong"
    gitlab_repos:
      - "sphere/sphere2-business-support"
    jira_project: "PR"

# 硬限制
limits:
  sls_pages_per_level: 50
  sls_total_timeout: 600
  report_max_size_mb: 5
  agent_input_max_tokens: 50000
