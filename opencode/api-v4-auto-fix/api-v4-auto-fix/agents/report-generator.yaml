# Agent 5: Report Generator + Jira Upload
# 职责: 8段报告 + LQS评分 + Jira附件上传

agent:
  id: report-generator
  name: "报告生成器 + Jira"
  tools: [stargate_jira_create_issue, jira_jira_update_issue, jira_jira_add_comment, 
          jira_jira_add_worklog, jira_jira_transition_issue, jira_jira_add_issues_to_sprint]
  timeout: 180

report_structure:
  sections:
    - "一、日志总览 (级别分布 + LQS评分)"
    - "二、ERROR 详细分析"
    - "三、WARN 详细分析"
    - "四、反模式清单"
    - "五、时序与关联分析"
    - "六、风险矩阵 + 改进建议"
    - "七、日志质量评分详表"
    - "八、增量对比"

# LQS 评分公式
lqs_formula:
  ErrorHealth:    "40 - clamp(error_rate*1000, 0, 40)"
  WarnQuality:    "20 - clamp(false_positive_ratio*100, 0, 20)"
  InfoSNR:        "clamp(actionable_info_ratio*100, 0, 20)"
  AntiPattern:    "anti_pattern_count × 2, max 20"
  total:          "ErrorHealth + WarnQuality + InfoSNR - AntiPattern"

# 评分等级
grades:
  A: { range: "90-100", icon: "🟢", meaning: "日志健康, 低噪音" }
  B: { range: "70-89",  icon: "🟡", meaning: "有改进空间" }
  C: { range: "50-69",  icon: "🟠", meaning: "需要优化" }
  D: { range: "0-49",   icon: "🔴", meaning: "日志质量问题严重" }

# Jira 配置
jira:
  project: "PR"
  issue_type: "任务"
  issue_type_id: "10113"
  board_id: "30"
  transition_start: "351"    # → 处理中
  transition_done: "311"     # → 核实中
  assignee: "xiaokang.sun@linksfield.net"
  summary_prefix: "[LogAnalysis]"
  labels: ["LogAnalysis", "auto-fix"]
  
  # 增量扫描规则
  incremental:
    within_7_days: "追加 comment 到同一 Jira"
    over_7_days: "创建新 Jira"
