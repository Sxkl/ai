# Agent 1: SLS Logs Puller
# иҒҢиҙЈ: з»ҹдёҖжӢүеҸ–жүҖжңүж—Ҙеҝ—зә§еҲ« (ERRORвҶ’WARNвҶ’INFO, йЎәеәҸжү§иЎҢ)
# SLS Project: uwp-prod, Region: cn-hongkong

agent:
  id: sls-puller
  name: "SLS з»ҹдёҖж—Ҙеҝ—жӢүеҸ–еҷЁ"
  tools: [stargate_Sls-20201230-GetHistograms, stargate_Sls-20201230-GetLogsV2, stargate_Sls-20201230-GetIndex, stargate_Sls-20201230-GetProjectLogs]
  timeout: 300

pull_strategy:
  # жӢүеҸ–йЎәеәҸ: д»Һе°‘еҲ°еӨҡ (и¶ҠйҮҚиҰҒи¶Ҡе…ҲжӢү)
  order: [ERROR, WARN, INFO]
  
  # INFO еҲҶеұӮжҠҪж ·зӯ–з•Ҙ
  info_sampling:
    threshold_small: 50000      # дҪҺдәҺжӯӨеҖје…ЁйҮҸ
    threshold_medium: 500000    # дҪҺдәҺжӯӨеҖј Top10 Logger Г— 500
    # й«ҳдәҺ 500000: Top5 Logger Г— 200 + distribution only
    
  # API и°ғз”ЁзЎ¬йҷҗеҲ¶
  api_limits:
    pages_per_level: 50          # жҜҸзә§еҲ« max 50 йЎө
    total_timeout_seconds: 600   # жҖ»и¶…ж—¶ 10 еҲҶй’ҹ
    
  # йҮҚиҜ•зӯ–з•Ҙ (жҢҮж•°йҖҖйҒҝ)
  retry:
    base_delay_ms: 1000
    max_delay_ms: 16000
    multiplier: 2
    jitter: 0.25
    retryable_status: [429, 500, 502, 503, 504]

# е·ІзҹҘ logstore й…ҚзҪ®
logstores:
  cube-api-v4:
    project: "uwp-prod"
    region: "cn-hongkong"
    fields: [ent_code, exception, req_at, req_body, req_header, req_method, 
             req_path, req_qs, req_ua, request_id, resp_code, resp_data,
             resp_message, resp_status, resp_success, time_elapsed]
    ttl_days: 180
    
  k8s-enterprise-gateway:
    project: "uwp-prod"
    region: "cn-hongkong"
    fields: [content, _pod_name_, _namespace_, _container_ip_]
    # жіЁж„Ҹ: ж— з»“жһ„еҢ–еӯ—ж®ө, д»…е…Ёж–Үзҙўеј•
    ttl_days: 30
    structured: false

# зҙўеј•еүҚзҪ®жЈҖжҹҘ (GetIndex зЎ®и®Өеӯ—ж®өеҸҜз”ЁжҖ§)
preflight_checks:
  - action: "GetIndex"
    purpose: "зЎ®и®Ө __content__ / line еӯ—ж®өеӯҳеңЁ"
  - action: "GetHistograms"
    purpose: "еҝ«йҖҹдәҶи§Јеҗ„зә§еҲ«ж—Ҙеҝ—йҮҸзә§"

# иҫ“еҮәж јејҸ (йў„иҒҡеҗҲ, дёҚдј еҺҹе§Ӣж—Ҙеҝ—)
output_format:
  required_fields:
    - total_count
    - unique_loggers
    - unique_error_types
    - time_histogram
    - top_patterns
    - truncated_flag
