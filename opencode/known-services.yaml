# 已知服务注册表 (自动增量)
# 每次扫描新服务后自动追加，无需手动配置
# 3.0 = iot-linksfield (v3/iot-linksfield/iot-linksfield)
# 4.0 = cube/platform (k8s-newk8s-*)

version: "2.0"
last_updated: "2026-05-23"

jira_defaults:
  project_key: "PR"
  issue_type: "Task"
  issue_type_name: "任务"
  issue_type_id: "10113"
  status_transitions:
    start_work: "351"                       # To do → 处理中(执行中)
    ready_for_qa: "311"                     # 处理中 → 核实中(测试中)
  time_tracking:
    default_estimate: "2h"
  worklog:
    create: false                           # 创建时不填工时
    complete: true                          # 回填时按实际运行时长
  plan_dates:
    target_start: "customfield_10108"
    target_end: "customfield_10109"
  required_fields:
    customfield_10456: "截止时间"
  assignee: "xiaokang.sun@linksfield.net"
  assignee_format: {"name": "xiaokang.sun@linksfield.net"}
  priority: "Medium"

mr_defaults:
  target_branch: "master"
  remove_source_branch: false
  squash: false
  auto_create: true
  auto_merge: false                       # 🚫 禁止自动合并
  assignee: "xiaokang.sun@linksfield.net"  # MR 经办人锁定
  title_prefix: "[AI AutoFix]"

sls_defaults:
  project: "uwp-prod"
  region: "cn-hongkong"

