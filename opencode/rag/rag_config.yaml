version: "2.0"

# === 线上模式 (Supabase pgvector) ===
supabase:
  url: "https://yqqrzyctdhxsppqanxnk.supabase.co"
  anon_key: "sb_publishable_GgCZCwMKkT4ZTRxWoZfUQg_PJsY54X1"
  table_name: "knowledge_vectors"
  embedding_provider: "openai"         # openai | local
  openai_api_key: ""                   # 用 Nebius API key，兼容 OpenAI 格式
  openai_base_url: "https://api.studio.nebius.com/v1/"   # Nebius 端点

# === 本地模式 (ChromaDB, 备用) ===
chromadb:
  persist_directory: "~/.config/opencode/rag/chroma_db"
  collection_name: "fix_knowledge"
  enabled: false

# === 线上模式开关 ===
storage_backend: "supabase"            # supabase | chromadb

embedding:
  model_name: "all-MiniLM-L6-v2"
  fallback_model: "paraphrase-multilingual-MiniLM-L12-v2"
  device: "cpu"

chunking:
  strategy: "markdown_header"
  chunk_size: 1000
  chunk_overlap: 200
  min_chunk_size: 50

knowledge_sources:
  - path: "~/.config/opencode/knowledge"
    glob: "**/*.md"
    recursive: true

search:
  default_top_k: 5
  similarity_threshold: 0.5
  rerank_enabled: true
  rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  hybrid_enabled: true
  rrf_k: 60
